name: Deploy to Kubernetes (kind)

# Module 4 deploy stage, executed entirely on GitHub Actions.
# AKS is blocked by the lab's KTB policy, so this stands up a kind cluster in the
# runner and Helm-deploys the pipeline-built ACR images to it (same job as helm_deploy.yaml).

on:
  workflow_dispatch:

jobs:
  helm_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0

      - name: Setup Helm
        uses: azure/setup-helm@v4.2.0
        with:
          version: '3.16.0'

      - name: Create namespace + ACR pull secret
        run: |
          kubectl create namespace pets
          kubectl create secret docker-registry acr-pull -n pets \
            --docker-server='${{ vars.ACR_REGISTRY }}' \
            --docker-username='${{ secrets.ACR_CLIENT_ID }}' \
            --docker-password='${{ secrets.ACR_CLIENT_PASSWORD }}'
          kubectl patch serviceaccount default -n pets -p '{"imagePullSecrets":[{"name":"acr-pull"}]}'

      - name: Deploy aks-store-demo (Helm, ACR images)
        env:
          ACR: ${{ vars.ACR_REGISTRY }}
        run: |
          helm upgrade --install aks-store-demo charts/aks-store-demo -n pets \
            --set aiService.image.repository=$ACR/ai-service           --set aiService.image.tag=latest \
            --set orderService.image.repository=$ACR/order-service     --set orderService.image.tag=latest \
            --set makelineService.image.repository=$ACR/makeline-service --set makelineService.image.tag=latest \
            --set productService.image.repository=$ACR/product-service --set productService.image.tag=latest \
            --set storeAdmin.image.repository=$ACR/store-admin         --set storeAdmin.image.tag=latest \
            --set storeFront.image.repository=$ACR/store-front         --set storeFront.image.tag=latest \
            --set virtualCustomer.image.repository=$ACR/virtual-customer --set virtualCustomer.image.tag=latest \
            --set virtualWorker.image.repository=$ACR/virtual-worker   --set virtualWorker.image.tag=latest

      - name: Wait for store-front + product-service, then show result
        run: |
          kubectl rollout status deploy/store-front -n pets --timeout=300s
          kubectl rollout status deploy/product-service -n pets --timeout=300s
          echo "=== deployed pods (note the acr...azurecr.io images) ==="
          kubectl get pods -n pets -o custom-columns='POD:.metadata.name,READY:.status.containerStatuses[0].ready,IMAGE:.spec.containers[0].image'
          echo "=== helm release ==="
          helm list -n pets
